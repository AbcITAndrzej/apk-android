name: Build APK

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Read app version from Gradle
        id: app_version
        run: |
          VERSION_CODE=$(grep -E "^[[:space:]]*versionCode[[:space:]]+[0-9]+" app/build.gradle | head -n 1 | awk '{print $2}')
          VERSION_NAME=$(grep -E "^[[:space:]]*versionName[[:space:]]+['\"]" app/build.gradle | head -n 1 | sed -E "s/.*versionName[[:space:]]+['\"]([^'\"]+)['\"].*/\1/")
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE"
          echo "versionName=$VERSION_NAME"

      - name: Build GitHub debug APK
        run: gradle assembleGithubDebug --no-daemon

      - name: Upload GitHub debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tv-dns-switcher-github-debug-apk
          path: app/build/outputs/apk/github/debug/*.apk

      - name: Decode release keystore
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build signed GitHub release APK
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle assembleGithubRelease --no-daemon

      - name: Upload signed GitHub release APK
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: tv-dns-switcher-github-release-signed-apk
          path: app/build/outputs/apk/github/release/*.apk

      - name: Publish GitHub Release on tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(ls app/build/outputs/apk/github/release/*.apk | head -n 1)
          OUT="TV-DNS-Switcher-${GITHUB_REF_NAME}.apk"
          cp "$APK" "$OUT"
          cat > release-notes.txt <<NOTES
          versionCode:${{ steps.app_version.outputs.version_code }}
          versionName:${{ steps.app_version.outputs.version_name }}
          signed:true
          channel:github-apk
          NOTES
          gh release create "$GITHUB_REF_NAME" "$OUT" \
            --title "TV DNS Switcher ${GITHUB_REF_NAME}" \
            --notes-file release-notes.txt
