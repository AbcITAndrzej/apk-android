name: Build APK

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: adguard-tv-dns-pro-v3-5-2-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode release keystore
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build signed release APK
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Upload signed release APK
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: adguard-tv-dns-pro-v3-5-2-release-signed-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release on tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          VERSION_CODE=$(grep -m1 "versionCode" app/build.gradle | awk '{print $2}')
          VERSION_NAME=$(sed -n "s/.*versionName ['\"]\([^'\"]*\)['\"].*/\1/p" app/build.gradle | head -n 1)
          SAFE_VERSION_NAME=$(echo "$VERSION_NAME" | tr -c 'A-Za-z0-9._-' '_')
          OUT_APK="AdGuard-TV-DNS-Pro-${SAFE_VERSION_NAME}-${GITHUB_REF_NAME}.apk"
          cp "$APK" "$OUT_APK"
          cat > release-notes.txt <<NOTES
          versionCode:${VERSION_CODE}
          versionName:${VERSION_NAME}
          signed:true
          channel:release
          tag:${GITHUB_REF_NAME}
          NOTES
          gh release create "$GITHUB_REF_NAME" "$OUT_APK" \
            --title "AdGuard TV DNS Pro ${GITHUB_REF_NAME}" \
            --notes-file release-notes.txt
