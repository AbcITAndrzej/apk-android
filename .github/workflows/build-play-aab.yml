name: Build Play Store AAB

on:
  workflow_dispatch:
  push:
    tags:
      - "play-v*"

permissions:
  contents: read

jobs:
  build-play-aab:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Decode upload keystore
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build signed Play Store AAB
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle bundlePlayRelease --no-daemon

      - name: Build unsigned Play Store AAB for diagnostics
        if: ${{ env.HAS_RELEASE_SIGNING != 'true' }}
        run: gradle bundlePlayRelease --no-daemon

      - name: Upload Play Store AAB
        uses: actions/upload-artifact@v4
        with:
          name: tv-dns-switcher-play-store-aab
          path: app/build/outputs/bundle/playRelease/*.aab

      - name: Print AAB files
        run: |
          find app/build/outputs/bundle/playRelease -type f -name "*.aab" -print
